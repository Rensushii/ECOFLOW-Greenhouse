<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>EcoFlow Greenhouse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #1b5e20 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      margin: 0; padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
      border-radius: 24px; padding: 3rem 2rem;
      max-width: 500px; width: 100%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { color: #1b5e20; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .status { color: #666; font-size: 1rem; margin-bottom: 2rem; line-height: 1.5; }
    .retry-btn {
      background: #1b5e20; color: white; border: none;
      padding: 14px 32px; font-size: 1rem; border-radius: 50px;
      cursor: pointer; transition: background 0.3s, transform 0.2s;
      display: inline-flex; align-items: center; gap: 8px; margin-bottom: 1.5rem;
    }
    .retry-btn:hover { background: #2e7d32; transform: translateY(-2px); }
    .retry-btn:active { transform: translateY(0); }
    .loader {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
      border-top-color: white; animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }
    .hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 480px) { .container { padding: 2rem 1.5rem; } h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
  <div class="container" id="redirectContainer">
    <!-- Connecting state -->
    <div id="redirectState">
      <div class="icon">🌿</div>
      <h1>EcoFlow Greenhouse</h1>
      <p class="status">Connecting to live dashboard…</p>
      <div class="loader"></div>
    </div>

    <!-- Offline state -->
    <div id="offlineState" class="hidden">
      <div class="icon">⚠️</div>
      <h1>Dashboard Offline</h1>
      <p class="status">
        The greenhouse system appears to be offline.<br>
        This could be because the Raspberry Pi is powered off,<br>
        the network is unavailable, or the tunnel has stopped.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">
        🔄 Retry Connection
      </button>
      <p style="color: #888; font-size: 0.85rem;">
        If this persists, please contact the system administrator.
      </p>
    </div>
  </div>

  <script>
    (function() {
      var cacheBuster = Date.now();
      var gistUrl = 'https://gist.githubusercontent.com/Rensushii/02945cbdc4abe5148470106e8a8648b8/raw/tunnel_url.txt?t=' + cacheBuster;

      fetch(gistUrl)
        .then(response => response.text())
        .then(url => {
          var trimmed = url.trim();
          if (!trimmed.startsWith('https://')) throw new Error('invalid');
          // Test if the tunnel is actually reachable by hitting /ping
          var pingUrl = trimmed.replace(/\/$/, '') + '/ping?t=' + cacheBuster;
          return fetch(pingUrl, { 
            mode: 'cors',
            signal: AbortSignal.timeout(5000)   // 5-second timeout
          }).then(pingResponse => {
            if (pingResponse.ok) {
              return trimmed;   // all good, redirect to dashboard
            } else {
              throw new Error('ping failed');
            }
          });
        })
        .then(finalUrl => {
          window.location.replace(finalUrl);
        })
        .catch(() => {
          // Either Gist fetch failed, URL invalid, or ping failed
          document.getElementById('redirectState').classList.add('hidden');
          document.getElementById('offlineState').classList.remove('hidden');
        });
    })();
  </script>
</body>
</html>
