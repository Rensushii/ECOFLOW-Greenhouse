<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Greenhouse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800;400;500;600;850&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2E8B57;
            --light-green: #3CB371;
            --dark-green: #1A5D3A;
            --bg-gradient: linear-gradient(135deg, #0c2b1a 0%, #1a3c2b 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(46, 139, 87, 0.3);
            --text-light: #f0fdf4;
            --text-muted: #a7f3d0;
            --danger: #ef4444;
            --key-bg: rgba(255, 255, 255, 0.15);
            --key-hover: rgba(60, 179, 113, 0.4);
            --key-active: rgba(46, 139, 87, 0.6);
            --key-text: #ffffff;
            --key-shadow: rgba(0, 0, 0, 0.3);
        }
       
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
       
        .login-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
       
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
       
        .header h1 {
            font-size: 2.2rem;
            font-weight: 850;
            background: linear-gradient(90deg, var(--light-green), #90EE90);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
       
        .header p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }
       
        .login-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }
       
        .error-message {
            color: var(--danger);
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
       
        .password-container {
            margin-bottom: 25px;
        }
       
        .password-input {
            position: relative;
            margin-bottom: 10px;
        }
       
        .password-input input {
            width: 100%;
            padding: 18px 50px 18px 20px;
            border: 2px solid var(--card-border);
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 18px;
            font-family: monospace;
            letter-spacing: 3px;
            box-sizing: border-box;
        }
       
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }
       
        .password-strength {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
       
        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
       
        .strength-0 { width: 20%; background: var(--danger); }
        .strength-1 { width: 40%; background: #f59e0b; }
        .strength-2 { width: 60%; background: #f59e0b; }
        .strength-3 { width: 80%; background: #10b981; }
        .strength-4 { width: 100%; background: #10b981; }
       
        .virtual-keyboard {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
       
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }
       
        .keyboard-key {
            height: 45px;
            background: var(--key-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: var(--key-text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            user-select: none;
            box-shadow: 0 2px 4px var(--key-shadow);
            min-width: 0;
            padding: 0 8px;
        }
       
        .keyboard-key:hover {
            background: var(--key-hover);
            transform: translateY(-1px);
            box-shadow: 0 3px 6px var(--key-shadow);
        }
       
        .keyboard-key:active {
            transform: translateY(1px);
            background: var(--key-active);
            box-shadow: 0 1px 2px var(--key-shadow);
        }
       
        /* Standard key sizes */
        .key-regular { width: 45px; }
        .key-medium { width: 55px; }
        .key-large { width: 70px; }
        .key-xlarge { width: 90px; }
        .key-xxlarge { width: 110px; }
        .key-space { width: 280px; }
       
        /* Special key styles */
        .key-special {
            background: rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.6);
        }
       
        .key-backspace {
            background: rgba(239, 68, 68, 0.4);
            border-color: rgba(239, 68, 68, 0.6);
        }
       
        .key-capslock {
            background: rgba(16, 185, 129, 0.4);
            border-color: rgba(16, 185, 129, 0.6);
        }
       
        .key-capslock.active {
            background: rgba(16, 185, 129, 0.8);
            border-color: rgba(16, 185, 129, 1);
        }
       
        .key-enter {
            background: rgba(59, 130, 246, 0.4);
            border-color: rgba(59, 130, 246, 0.6);
        }
       
        .key-shift {
            background: rgba(245, 158, 11, 0.4);
            border-color: rgba(245, 158, 11, 0.6);
        }
       
        .key-shift.active {
            background: rgba(245, 158, 11, 0.8);
            border-color: rgba(245, 158, 11, 1);
        }
       
        .login-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
       
        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
       
        .login-button:active {
            transform: translateY(-1px);
        }
       
        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
       
        .back-link {
            text-align: center;
        }
       
        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s;
        }
       
        .back-link a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }
       
        .caps-indicator {
            position: absolute;
            top: -25px;
            right: 10px;
            color: #10b981;
            font-size: 0.8rem;
            display: none;
            background: rgba(16, 185, 129, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
       
        .caps-indicator.active {
            display: block;
        }
       
        .shift-indicator {
            position: absolute;
            top: -25px;
            left: 10px;
            color: #f59e0b;
            font-size: 0.8rem;
            display: none;
            background: rgba(245, 158, 11, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }
       
        .shift-indicator.active {
            display: block;
        }
       
        @media (max-width: 768px) {
            .login-container {
                padding: 10px;
                max-width: 95%;
            }
           
            .login-box {
                padding: 20px;
            }
           
            .keyboard-key {
                height: 40px;
                font-size: 13px;
                padding: 0 6px;
            }
           
            .key-regular { width: 40px; }
            .key-medium { width: 50px; }
            .key-large { width: 65px; }
            .key-xlarge { width: 85px; }
            .key-xxlarge { width: 100px; }
            .key-space { width: 200px; }
           
            .keyboard-row {
                gap: 5px;
                margin-bottom: 5px;
            }
           
            .virtual-keyboard {
                padding: 10px;
            }
           
            .password-input input {
                padding: 15px 45px 15px 15px;
                font-size: 16px;
            }
        }
       
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
       
        .shake {
            animation: shake 0.5s;
        }
       
        .char-count {
            text-align: right;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }
       
        .key-pressed {
            transform: translateY(2px) !important;
            background: var(--key-active) !important;
            box-shadow: 0 1px 2px var(--key-shadow) !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1><i class="fas fa-lock"></i> Admin Access</h1>
            <p>Use the virtual keyboard to enter password</p>
        </div>
       
        <div class="login-box">
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}
           
            <form method="POST" id="loginForm">
                <input type="hidden" name="password" id="passwordField">
               
                <div class="password-container">
                    <div class="password-input">
                        <input type="password" id="passwordDisplay" placeholder="Enter password" readonly>
                        <div class="caps-indicator" id="capsIndicator">CAPS LOCK</div>
                        <div class="shift-indicator" id="shiftIndicator">SHIFT</div>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="char-count">
                        <span id="charCount">0</span> characters
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>
               
                <!-- Standard US Keyboard Layout -->
                <div class="virtual-keyboard">
                    <!-- Row 1: Function keys (hidden/removed as requested) -->
                    
                    <!-- Row 2: Numbers and symbols -->
                    <div class="keyboard-row">
                        <div class="keyboard-key key-regular" data-key="`">`</div>
                        <div class="keyboard-key key-regular" data-key="1">1</div>
                        <div class="keyboard-key key-regular" data-key="2">2</div>
                        <div class="keyboard-key key-regular" data-key="3">3</div>
                        <div class="keyboard-key key-regular" data-key="4">4</div>
                        <div class="keyboard-key key-regular" data-key="5">5</div>
                        <div class="keyboard-key key-regular" data-key="6">6</div>
                        <div class="keyboard-key key-regular" data-key="7">7</div>
                        <div class="keyboard-key key-regular" data-key="8">8</div>
                        <div class="keyboard-key key-regular" data-key="9">9</div>
                        <div class="keyboard-key key-regular" data-key="0">0</div>
                        <div class="keyboard-key key-regular" data-key="-">-</div>
                        <div class="keyboard-key key-regular" data-key="=">=</div>
                        <div class="keyboard-key key-backspace key-xlarge" id="backspaceKey">
                            <i class="fas fa-backspace"></i>
                        </div>
                    </div>
                   
                    <!-- Row 3: First letter row -->
                    <div class="keyboard-row">
                        <div class="keyboard-key key-regular" data-key="q">Q</div>
                        <div class="keyboard-key key-regular" data-key="w">W</div>
                        <div class="keyboard-key key-regular" data-key="e">E</div>
                        <div class="keyboard-key key-regular" data-key="r">R</div>
                        <div class="keyboard-key key-regular" data-key="t">T</div>
                        <div class="keyboard-key key-regular" data-key="y">Y</div>
                        <div class="keyboard-key key-regular" data-key="u">U</div>
                        <div class="keyboard-key key-regular" data-key="i">I</div>
                        <div class="keyboard-key key-regular" data-key="o">O</div>
                        <div class="keyboard-key key-regular" data-key="p">P</div>
                        <div class="keyboard-key key-regular" data-key="[">[</div>
                        <div class="keyboard-key key-regular" data-key="]">]</div>
                        <div class="keyboard-key key-regular" data-key="\\">\</div>
                    </div>
                   
                    <!-- Row 4: Second letter row -->
                    <div class="keyboard-row">
                        <div class="keyboard-key key-capslock key-large" id="capsLockKey">
                            <i class="fas fa-arrow-up"></i>
                        </div>
                        <div class="keyboard-key key-regular" data-key="a">A</div>
                        <div class="keyboard-key key-regular" data-key="s">S</div>
                        <div class="keyboard-key key-regular" data-key="d">D</div>
                        <div class="keyboard-key key-regular" data-key="f">F</div>
                        <div class="keyboard-key key-regular" data-key="g">G</div>
                        <div class="keyboard-key key-regular" data-key="h">H</div>
                        <div class="keyboard-key key-regular" data-key="j">J</div>
                        <div class="keyboard-key key-regular" data-key="k">K</div>
                        <div class="keyboard-key key-regular" data-key="l">L</div>
                        <div class="keyboard-key key-regular" data-key=";">;</div>
                        <div class="keyboard-key key-regular" data-key="'">'</div>
                        <div class="keyboard-key key-enter key-large" id="enterKey">
                            ENTER
                        </div>
                    </div>
                   
                    <!-- Row 5: Third letter row with Shift -->
                    <div class="keyboard-row">
                        <div class="keyboard-key key-shift key-xlarge" id="shiftKey">
                            SHIFT
                        </div>
                        <div class="keyboard-key key-regular" data-key="z">Z</div>
                        <div class="keyboard-key key-regular" data-key="x">X</div>
                        <div class="keyboard-key key-regular" data-key="c">C</div>
                        <div class="keyboard-key key-regular" data-key="v">V</div>
                        <div class="keyboard-key key-regular" data-key="b">B</div>
                        <div class="keyboard-key key-regular" data-key="n">N</div>
                        <div class="keyboard-key key-regular" data-key="m">M</div>
                        <div class="keyboard-key key-regular" data-key=",">,</div>
                        <div class="keyboard-key key-regular" data-key=".">.</div>
                        <div class="keyboard-key key-regular" data-key="/">/</div>
                        <div class="keyboard-key key-shift key-xlarge" id="rightShiftKey">
                            SHIFT
                        </div>
                    </div>
                   
                    <!-- Row 6: Space bar row -->
                    <div class="keyboard-row">
                        <div class="keyboard-key key-special key-large" id="clearKey">
                            <i class="fas fa-eraser"></i> CLEAR
                        </div>
                        <div class="keyboard-key key-space" id="spaceKey" data-key=" ">SPACE</div>
                    </div>
                </div>
               
                <button type="submit" class="login-button" id="loginButton" disabled>
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
           
            <div class="back-link">
                <a href="/"><i class="fas fa-arrow-left"></i> Back to Kiosk</a>
            </div>
        </div>
    </div>
   
    <script>
        // Password state
        let password = '';
        let showPassword = false;
        let capsLock = false;
        let shiftPressed = false;
        const correctPassword = 'ecoflow'; // From config.py
       
        // DOM elements
        const passwordField = document.getElementById('passwordField');
        const passwordDisplay = document.getElementById('passwordDisplay');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const loginButton = document.getElementById('loginButton');
        const strengthBar = document.getElementById('strengthBar');
        const charCount = document.getElementById('charCount');
        const capsIndicator = document.getElementById('capsIndicator');
        const shiftIndicator = document.getElementById('shiftIndicator');
        const capsLockKey = document.getElementById('capsLockKey');
        const shiftKey = document.getElementById('shiftKey');
        const rightShiftKey = document.getElementById('rightShiftKey');
       
        // Update password display
        function updatePasswordDisplay() {
            if (showPassword) {
                passwordDisplay.value = password;
                togglePasswordBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                passwordDisplay.value = '?'.repeat(password.length);
                togglePasswordBtn.innerHTML = '<i class="fas fa-eye"></i>';
            }
            passwordField.value = password;
            charCount.textContent = password.length;
           
            // Update login button state
            loginButton.disabled = password.length === 0;
           
            // Update strength indicator
            updateStrengthIndicator();
        }
       
        // Calculate password strength
        function calculateStrength(pwd) {
            let strength = 0;
           
            if (pwd.length >= 4) strength++;
            if (pwd.length >= 6) strength++;
            if (/[a-z]/.test(pwd)) strength++;
            if (/[A-Z]/.test(pwd)) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            if (/[^a-zA-Z0-9]/.test(pwd)) strength++;
           
            return Math.min(strength, 4);
        }
       
        // Update strength indicator
        function updateStrengthIndicator() {
            const strength = calculateStrength(password);
            strengthBar.className = 'strength-bar';
            strengthBar.classList.add(`strength-${strength}`);
        }
       
        // Get character with proper case
        function getCharacter(char) {
            if (capsLock || shiftPressed) {
                // For letters, uppercase if caps lock OR shift is active
                if (/^[a-z]$/.test(char)) {
                    return char.toUpperCase();
                }
                // For numbers and symbols, use shift variations
                if (shiftPressed) {
                    const shiftMap = {
                        '`': '~', '1': '!', '2': '@', '3': '#', '4': '$',
                        '5': '%', '6': '^', '7': '&', '8': '*', '9': '(',
                        '0': ')', '-': '_', '=': '+', '[': '{', ']': '}',
                        '\\': '|', ';': ':', "'": '"', ',': '<', '.': '>',
                        '/': '?'
                    };
                    return shiftMap[char] || char;
                }
            }
            return char;
        }
       
        // Add character to password
        function addCharacter(char) {
            if (password.length < 30) {
                const processedChar = getCharacter(char);
                password += processedChar;
                updatePasswordDisplay();
                // Auto-release shift after typing
                if (shiftPressed) {
                    toggleShift();
                }
            }
        }
       
        // Remove last character
        function backspace() {
            if (password.length > 0) {
                password = password.slice(0, -1);
                updatePasswordDisplay();
            }
        }
       
        // Clear password
        function clearPassword() {
            password = '';
            updatePasswordDisplay();
        }
       
        // Toggle password visibility
        function togglePasswordVisibility() {
            showPassword = !showPassword;
            updatePasswordDisplay();
        }
       
        // Toggle caps lock
        function toggleCapsLock() {
            capsLock = !capsLock;
            capsLockKey.classList.toggle('active', capsLock);
            capsIndicator.classList.toggle('active', capsLock);
        }
       
        // Toggle shift
        function toggleShift() {
            shiftPressed = !shiftPressed;
            shiftKey.classList.toggle('active', shiftPressed);
            rightShiftKey.classList.toggle('active', shiftPressed);
            shiftIndicator.classList.toggle('active', shiftPressed);
        }
       
        // Shake animation for wrong password
        function shakeInput() {
            passwordDisplay.classList.add('shake');
            setTimeout(() => {
                passwordDisplay.classList.remove('shake');
            }, 500);
        }
       
        // Visual feedback for key press
        function animateKeyPress(keyElement) {
            keyElement.classList.add('key-pressed');
            setTimeout(() => {
                keyElement.classList.remove('key-pressed');
            }, 150);
        }
       
        // Handle virtual keyboard key press
        function handleVirtualKeyPress(key) {
            const keyElement = document.querySelector(`[data-key="${key}"]`);
            if (keyElement) {
                animateKeyPress(keyElement);
                
                if (key === ' ') {
                    addCharacter(' ');
                } else {
                    addCharacter(key);
                }
            }
        }
       
        // Handle physical keyboard input
        function handlePhysicalKeyPress(event) {
            const key = event.key.toLowerCase();
            
            // Prevent default for all keys
            event.preventDefault();
            
            // Handle backspace
            if (key === 'backspace' || key === 'delete') {
                backspace();
                return;
            }
            
            // Handle enter key
            if (key === 'enter') {
                if (password.length > 0) {
                    document.getElementById('loginForm').submit();
                }
                return;
            }
            
            // Handle escape key
            if (key === 'escape') {
                clearPassword();
                return;
            }
            
            // Handle space key
            if (key === ' ') {
                addCharacter(' ');
                return;
            }
            
            // Handle caps lock key
            if (key === 'capslock') {
                toggleCapsLock();
                return;
            }
            
            // Check for shift key
            if (key === 'shift') {
                shiftPressed = true;
                shiftKey.classList.add('active');
                rightShiftKey.classList.add('active');
                shiftIndicator.classList.add('active');
                return;
            }
            
            // Check for caps lock
            capsLock = event.getModifierState('CapsLock');
            capsLockKey.classList.toggle('active', capsLock);
            capsIndicator.classList.toggle('active', capsLock);
            
            // Allow basic keyboard characters
            const allowedChars = /^[a-z0-9`\-=\[\]\\;',\.\/]$/;
            if (allowedChars.test(key)) {
                addCharacter(key);
            }
        }
        
        // Handle physical key release
        function handlePhysicalKeyRelease(event) {
            const key = event.key.toLowerCase();
            
            // Handle shift key release
            if (key === 'shift') {
                shiftPressed = false;
                shiftKey.classList.remove('active');
                rightShiftKey.classList.remove('active');
                shiftIndicator.classList.remove('active');
            }
        }
       
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set up virtual keyboard events
            document.querySelectorAll('.keyboard-key[data-key]').forEach(key => {
                key.addEventListener('click', () => {
                    const keyValue = key.getAttribute('data-key');
                    handleVirtualKeyPress(keyValue);
                });
            });
           
            // Special keys
            document.getElementById('backspaceKey').addEventListener('click', backspace);
            document.getElementById('clearKey').addEventListener('click', clearPassword);
            document.getElementById('enterKey').addEventListener('click', function() {
                if (password.length > 0) {
                    document.getElementById('loginForm').submit();
                }
            });
            document.getElementById('capsLockKey').addEventListener('click', toggleCapsLock);
            document.getElementById('shiftKey').addEventListener('click', toggleShift);
            document.getElementById('rightShiftKey').addEventListener('click', toggleShift);
            document.getElementById('spaceKey').addEventListener('click', function() {
                addCharacter(' ');
            });
           
            // Toggle password visibility
            togglePasswordBtn.addEventListener('click', togglePasswordVisibility);
           
            // Handle physical keyboard
            document.addEventListener('keydown', handlePhysicalKeyPress);
            document.addEventListener('keyup', handlePhysicalKeyRelease);
           
            // Form submission
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                if (password.length === 0) {
                    e.preventDefault();
                    shakeInput();
                }
            });
           
            // Prevent context menu on virtual keyboard
            document.querySelector('.virtual-keyboard').addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
           
            // Focus password display
            passwordDisplay.focus();
           
            // Initial update
            updatePasswordDisplay();
        });
       
        // Add touch feedback for mobile
        document.addEventListener('touchstart', function() {}, {passive: true});
       
        // Prevent zoom on double tap for mobile
        document.addEventListener('dblclick', function(e) {
            if (e.target.classList.contains('keyboard-key')) {
                e.preventDefault();
            }
        }, {passive: false});
    </script>
</body>
</html>
